# ============================================================
#  Itanta AI Agent Hackathon 2026 — Team Intent
#  Core Orchestrator Configuration
# ============================================================

# ── LLM ──────────────────────────────────────────────────────
llm:
  provider: gemini
  model: gemini-1.5-pro          # or gemini-1.5-flash for speed
  temperature: 0.2
  max_output_tokens: 8192
  # API key is read from env var GEMINI_API_KEY — never hard-code it here

# ── Retry / Recovery ─────────────────────────────────────────
recovery:
  max_retries_per_task: 3        # FR-15
  retry_backoff_seconds: 2       # seconds between retries (doubles each time)
  max_rollback_depth: 5          # how many checkpoints back we are willing to go

# ── Human Checkpoints ────────────────────────────────────────
checkpoints:
  require_spec_approval: true    # after Clarifier → before Architect
  require_plan_approval: true    # after Planner → before TDD+Code
  require_diff_approval: true    # after Coder → before applying to disk
  file_change_threshold: 10      # force checkpoint if >N files would be changed

# ── Safety Guardrails ────────────────────────────────────────
safety:
  blocked_shell_patterns:        # NFR-05
    - "rm -rf /"
    - "rm -rf ~"
    - "sudo rm"
    - "mkfs"
  security_audit_enabled: true   # FR-14 (EXTENDED)

# ── Logging ──────────────────────────────────────────────────
logging:
  level: INFO                    # DEBUG | INFO | WARNING | ERROR
  log_dir: ./logs
  activity_log_file: activity.log
  summary_file: workflow_summary.json

# ── State / Checkpoints persistence ──────────────────────────
state:
  checkpoint_dir: ./checkpoints
  format: json                   # json | yaml

# ── Workflow Agents (enable/disable) ─────────────────────────
agents:
  clarifier: true
  architect: true
  planner: true
  qa: true
  coder: true
  reviewer: true
  recovery: true
